services:
  kitsune-db:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: animedb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: always

  consumet:
    image: riimuru/consumet-api
    platform: linux/amd64
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
volumes:
  postgres_data: